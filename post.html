<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minj.devlog.post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <a href="about.html" class="logo">minj<span class="logo-dot">.</span></a>
    <div class="topbar-right">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="검색..." autocomplete="off" />
        <button class="search-btn" onclick="window.location.href='index.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
      </div>
      <a href="#" id="editThisPost" title="이 글 편집 (로컬 전용)"
        style="display:none; font-size:0.8rem; color:var(--text-muted); padding:6px 12px; border:1px solid var(--border); border-radius:var(--radius); text-decoration:none; transition: all 0.15s;"
        onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'"
        onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">✏️ 편집</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="category-nav">
        <div class="sidebar-section-title">카테고리</div>
        <div class="cat-group cat-intro">
          <a href="about.html" class="cat-intro-link">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            Intro
          </a>
        </div>
        <div class="cat-group">
          <button class="cat-toggle" onclick="toggleCat(this)">
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <polyline points="6 9 12 15 18 9" />
            </svg>
            Java
          </button>
          <ul class="cat-list open">
            <li><a href="index.html">Spring</a></li>
            <li><a href="index.html">JPA</a></li>
          </ul>
        </div>
        <div class="cat-group">
          <button class="cat-toggle" onclick="toggleCat(this)">
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <polyline points="6 9 12 15 18 9" />
            </svg>
            클라우드
          </button>
          <ul class="cat-list open">
            <li><a href="index.html">AWS</a></li>
            <li><a href="index.html">Docker</a></li>
          </ul>
        </div>
        <a href="index.html" class="cat-all">전체 글 보기</a>
      </nav>
      <div class="hashtag-section">
        <div class="sidebar-section-title">태그</div>
        <div class="hashtag-list" id="hashtagList"></div>
      </div>
    </aside>

    <main class="main post-detail-wrap">
      <article class="post-detail" id="postDetail">
        <!-- populated by JS -->
      </article>

      <div class="post-nav" id="postNav">
        <!-- prev/next populated by JS -->
      </div>
    </main>
  </div>

  <script src="posts.js"></script>
  <script src="path-resolver.js"></script>
  <script src="sidebar.js"></script>
  <script src="post.js"></script>
  <script>
    // 로컬 환경에서만 편집 버튼 표시
    if (location.protocol === "file:" || location.hostname === "localhost" || location.hostname === "127.0.0.1") {
      const link = document.getElementById("editThisPost");
      if (link) {
        link.style.display = "inline-flex";
        const slug = new URLSearchParams(location.search).get("slug");
        if (slug) link.href = `editor.html?slug=${slug}`;
      }
    }
  </script>
</body>

</html>
