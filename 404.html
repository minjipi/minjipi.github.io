<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minj.devlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script>
    // /posts/{slug} 패턴 감지 → 클린 URL로 포스트 렌더링
    (function () {
      var path = window.location.pathname;
      var m = path.match(/^\/posts\/([^\/]+)\/?$/);
      if (m) {
        window._cleanUrlSlug = decodeURIComponent(m[1]);
      }
    })();
  </script>
</head>

<body>
  <header class="topbar" style="position:relative;">
    <a href="/" class="logo">minj<span class="logo-dot">.</span></a>
    <nav class="topbar-nav">
      <a href="/posts" class="topnav-link">posts</a>
      <a href="/" class="topnav-link">about</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
    </aside>

    <main class="main post-detail-wrap" id="mainContent">
      <!-- 포스트 슬러그가 있으면 포스트 렌더링, 없으면 404 표시 -->
    </main>
  </div>

  <script src="/posts.js"></script>
  <script src="/path-resolver.js"></script>
  <script src="/sidebar.js"></script>
  <script src="/post.js"></script>
  <script>
    (function () {
      var main = document.getElementById("mainContent");
      if (window._cleanUrlSlug) {
        // 포스트 페이지로 렌더링 — post.js의 DOMContentLoaded가 처리함
        main.innerHTML =
          '<article class="post-detail" id="postDetail"></article>' +
          '<div class="post-nav" id="postNav"></div>';
        // 타이틀은 post.js가 설정
        document.title = "minj.devlog";
      } else {
        // 진짜 404
        main.innerHTML =
          '<div class="no-results" style="margin-top:60px;">' +
          '<div class="nr-icon">🔍</div>' +
          '<p style="font-size:1.1rem;font-weight:600;margin-bottom:8px;">페이지를 찾을 수 없습니다</p>' +
          '<p style="font-size:0.9rem;">요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>' +
          '<a href="/" style="margin-top:24px;display:inline-block;color:var(--accent);font-size:0.9rem;">← 홈으로 돌아가기</a>' +
          '</div>';
        document.title = "404 - minj.devlog";
      }
    })();
  </script>
</body>

</html>
